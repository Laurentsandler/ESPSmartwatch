[platformio]
src_dir = .
include_dir = .

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Board configuration for 16MB Flash and 8MB PSRAM
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv

lib_deps =
	bblanchon/ArduinoJson @ ^6.21.3
	bodmer/TFT_eSPI @ ^2.5.43
	lvgl/lvgl @ ^8.3.11

build_flags =
	-DBOARD_HAS_PSRAM
	
	; --- LVGL Configuration ---
	-D LV_CONF_INCLUDE_SIMPLE
	
	; --- TFT_eSPI Driver Configuration ---
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_WIDTH=172
	-D TFT_HEIGHT=320
	
	; Common Pins for ESP32-S3 1.47" Boards (e.g., Waveshare). 
	; Adjust if your specific board differs!
	-D TFT_MOSI=11
	-D TFT_SCLK=10
	-D TFT_CS=9
	-D TFT_DC=8
	-D TFT_RST=12
	-D TFT_BL=13
    
    ; Display offset (may be needed for 1.47" ST7789)
    -D CGRAM_OFFSET=1

	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
